services:
  # ─── Python Backend Daemon ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: echo-backend
    restart: unless-stopped
    # Host network mode is REQUIRED for UDP multicast discovery to work.
    # Bridge mode isolates the container into its own network namespace,
    # which breaks multicast group joins on the LAN interface.
    network_mode: host
    environment:
      - ECHO_USERNAME=${ECHO_USERNAME:-dockeruser}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source for live-reload during development
      - ./backend:/app/backend:ro

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: echo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8765
    depends_on:
      - backend
